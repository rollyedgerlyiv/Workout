<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0D0D0D">
<title>Workout Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #0D0D0D;
    color: #F0EDE8;
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 40px;
    min-height: 100vh;
  }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }
  button { cursor: pointer; }
  .hidden { display: none !important; }
  .scroll-x { display: flex; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
  .scroll-x::-webkit-scrollbar { display: none; }

  /* ── Header ── */
  #header {
    background: #111;
    border-bottom: 1px solid #1e1e1e;
    padding: 20px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #header .eyebrow { font-size: 10px; letter-spacing: 0.2em; color: #555; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
  #header h1 { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
  #save-flash { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; color: #333; transition: color 0.3s; }
  #save-flash.active { color: #27AE60; }
  .header-row { display: flex; justify-content: space-between; align-items: center; }

  /* ── Week Picker ── */
  #week-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  #week-row .label { font-size: 12px; color: #555; font-weight: 600; }
  #week-num { font-size: 20px; font-weight: 900; min-width: 24px; text-align: center; }
  .week-btn {
    width: 28px; height: 28px; border-radius: 6px;
    background: #1a1a1a; border: 1px solid #2a2a2a;
    color: #888; font-size: 16px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  #week-vs { font-size: 11px; color: #555; margin-left: 6px; }

  /* ── Week Strip ── */
  #week-strip {
    gap: 6px;
    padding: 14px 20px;
    background: #0f0f0f;
    border-bottom: 1px solid #1a1a1a;
  }
  .strip-btn {
    flex: 0 0 auto; min-width: 56px; padding: 8px 10px;
    border-radius: 8px; border: 1.5px solid #222;
    background: #141414; text-align: center;
    transition: all 0.15s;
  }
  .strip-btn.rest { opacity: 0.35; cursor: default; }
  .strip-btn .strip-day { font-size: 9px; letter-spacing: 0.1em; font-weight: 700; text-transform: uppercase; color: #555; }
  .strip-btn .strip-name { font-size: 11px; font-weight: 800; color: #666; margin-top: 2px; }

  /* ── Day Header ── */
  #day-header {
    margin: 16px 16px 0;
    border-radius: 12px;
    padding: 16px 18px;
    display: flex; align-items: center; gap: 14px;
  }
  #day-header .day-meta { flex: 1; }
  #day-header .day-eyebrow { font-size: 10px; letter-spacing: 0.15em; font-weight: 700; text-transform: uppercase; }
  #day-header .day-title { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
  #day-header .day-focus { font-size: 12px; color: #777; margin-top: 2px; }
  .view-btns { display: flex; gap: 8px; }
  .view-btn {
    padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.08em;
    border: 1.5px solid #2a2a2a; background: #1a1a1a; color: #555;
    transition: all 0.15s;
  }

  /* ── Day Tabs ── */
  #day-tabs { gap: 6px; padding: 12px 16px 4px; }
  .day-tab {
    flex: 0 0 auto; padding: 6px 14px; border-radius: 999px;
    border: 1.5px solid #222; background: #141414;
    color: #555; font-size: 11px; font-weight: 800;
    transition: all 0.15s;
  }

  /* ── Content ── */
  #content { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }

  /* ── Exercise Card ── */
  .ex-card {
    background: #141414; border: 1px solid #1e1e1e;
    border-radius: 12px; overflow: hidden;
  }
  .ex-header { padding: 14px 16px 10px; border-bottom: 1px solid #1a1a1a; }
  .ex-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .ex-name { font-size: 15px; font-weight: 800; line-height: 1.3; flex: 1; padding-right: 10px; }
  .chips { display: flex; gap: 5px; flex-shrink: 0; }
  .chip {
    border-radius: 6px; padding: 3px 7px;
    font-size: 10px; font-weight: 800; letter-spacing: 0.04em; white-space: nowrap;
  }
  .goal-banner {
    margin-top: 10px; padding: 8px 12px; border-radius: 8px;
    font-size: 12px; line-height: 1.5;
  }
  .ex-hint { margin-top: 8px; font-size: 11px; color: #555; font-style: italic; }

  /* ── Set Inputs ── */
  .ex-body { padding: 10px 16px 14px; }
  .col-headers { display: flex; gap: 8px; margin-bottom: 8px; padding-left: 34px; }
  .col-hdr { flex: 1; font-size: 9px; color: #444; font-weight: 700; letter-spacing: 0.1em; text-align: center; }
  .set-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .set-badge {
    width: 26px; height: 26px; border-radius: 6px;
    background: #1a1a1a; border: 1px solid #2a2a2a;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: #444; font-weight: 800;
    transition: all 0.2s; flex-shrink: 0;
  }
  .set-badge.hit { }
  .set-input {
    flex: 1; background: #1a1a1a; border: 1px solid #2a2a2a;
    border-radius: 8px; color: #F0EDE8; font-size: 15px; font-weight: 700;
    text-align: center; padding: 8px 4px; outline: none;
    transition: border 0.15s; width: 100%;
  }
  .prev-val { flex: 1; text-align: center; font-size: 11px; color: #444; font-weight: 600; }
  .volume-row {
    margin-top: 8px; display: flex; justify-content: flex-end;
    gap: 8px; align-items: center;
  }
  .vol-label { font-size: 10px; color: #444; font-weight: 600; letter-spacing: 0.08em; }
  .vol-num { font-size: 13px; color: #888; font-weight: 800; }
  .vol-diff { font-size: 11px; font-weight: 700; }

  /* ── Goals View ── */
  .goals-hint { font-size: 12px; color: #555; padding: 4px 0 8px; line-height: 1.6; }
  .goal-card {
    background: #141414; border: 1px solid #1e1e1e;
    border-radius: 12px; padding: 14px 16px; transition: all 0.25s;
  }
  .goal-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .goal-card-name { font-size: 14px; font-weight: 800; flex: 1; }
  .crushed-label { font-size: 12px; font-weight: 800; }
  .goal-boxes { margin-top: 10px; display: flex; gap: 8px; }
  .goal-box {
    flex: 1; background: #1a1a1a;
    border-radius: 8px; padding: 8px 10px; text-align: center;
  }
  .goal-box-label { font-size: 9px; color: #444; letter-spacing: 0.1em; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
  .goal-box-val { font-size: 16px; font-weight: 900; }
  .goal-strategy { margin-top: 10px; font-size: 12px; color: #666; font-style: italic; line-height: 1.5; }
  .goal-last { margin-top: 8px; font-size: 11px; color: #444; }
  .goal-empty { margin-top: 8px; font-size: 12px; color: #444; font-style: italic; }

  /* ── Notes ── */
  #notes {
    margin: 8px 16px 0; padding: 14px 16px;
    background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 10px;
  }
  .notes-title { font-size: 10px; letter-spacing: 0.12em; color: #444; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
  .note-row { display: flex; gap: 8px; margin-bottom: 5px; }
  .note-dash { color: #333; font-size: 11px; }
  .note-text { font-size: 12px; color: #555; line-height: 1.5; }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="eyebrow">Progressive Overload Tracker</div>
  <div class="header-row">
    <h1>5-Day Split</h1>
    <div id="save-flash">AUTO-SAVE</div>
  </div>
  <div id="week-row">
    <span class="label">WEEK</span>
    <button class="week-btn" id="week-prev">‹</button>
    <span id="week-num">1</span>
    <button class="week-btn" id="week-next">›</button>
    <span id="week-vs"></span>
  </div>
</div>

<!-- Week Schedule Strip -->
<div class="scroll-x" id="week-strip"></div>

<!-- Day Header -->
<div id="day-header">
  <div class="day-meta">
    <div class="day-eyebrow" id="dh-eyebrow"></div>
    <div class="day-title" id="dh-title"></div>
    <div class="day-focus" id="dh-focus"></div>
  </div>
  <div class="view-btns">
    <button class="view-btn" id="btn-log" onclick="setView('log')">Log</button>
    <button class="view-btn" id="btn-goals" onclick="setView('goals')">Goals</button>
  </div>
</div>

<!-- Day Tabs -->
<div class="scroll-x" id="day-tabs"></div>

<!-- Main Content -->
<div id="content"></div>

<!-- Notes -->
<div id="notes">
  <div class="notes-title">How it works</div>
  <div class="note-row"><span class="note-dash">—</span><span class="note-text">Hit top of rep range on all sets → weight goes up next week</span></div>
  <div class="note-row"><span class="note-dash">—</span><span class="note-text">Struggling below rep range → hold weight, build clean reps</span></div>
  <div class="note-row"><span class="note-dash">—</span><span class="note-text">In range → same weight, push for more reps</span></div>
  <div class="note-row"><span class="note-dash">—</span><span class="note-text">✓ marks appear on sets that hit this week's goal</span></div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const DAYS = [
  {
    id: "push", label: "DAY 1", name: "Push", focus: "Chest · Shoulders · Triceps", color: "#E8572A",
    exercises: [
      { id: "bench",    name: "Barbell Bench Press",        sets: 3, repRange: [4, 6]   },
      { id: "incline",  name: "Incline Dumbbell Press",     sets: 3, repRange: [6, 8]   },
      { id: "ohp",      name: "Overhead Press",             sets: 3, repRange: [4, 6]   },
      { id: "lateral",  name: "Cable Lateral Raise",        sets: 2, repRange: [10, 10] },
      { id: "pushdown", name: "Tricep Pushdown (Rope)",     sets: 3, repRange: [8, 10]  },
      { id: "triext",   name: "Overhead Tricep Extension",  sets: 2, repRange: [8, 10]  },
    ],
  },
  {
    id: "pull", label: "DAY 2", name: "Pull", focus: "Back · Biceps · Rear Delts", color: "#2A7BE8",
    exercises: [
      { id: "pullup",   name: "Weighted Pull-Up",           sets: 3, repRange: [4, 6]   },
      { id: "bbrow",    name: "Barbell Row",                sets: 3, repRange: [5, 7]   },
      { id: "dbrow",    name: "Chest-Supported DB Row",     sets: 2, repRange: [8, 10]  },
      { id: "facepull", name: "Face Pull (Cable)",          sets: 3, repRange: [10, 10] },
      { id: "bbcurl",   name: "Barbell Curl",               sets: 3, repRange: [6, 8]   },
      { id: "inccurl",  name: "Incline Dumbbell Curl",      sets: 2, repRange: [8, 10]  },
    ],
  },
  {
    id: "legs", label: "DAY 3", name: "Legs", focus: "Quads · Hamstrings · Glutes · Calves", color: "#27AE60",
    exercises: [
      { id: "squat",    name: "Barbell Back Squat",         sets: 3, repRange: [4, 6]   },
      { id: "rdl",      name: "Romanian Deadlift",          sets: 3, repRange: [6, 8]   },
      { id: "bss",      name: "Bulgarian Split Squat",      sets: 3, repRange: [6, 8]   },
      { id: "legpress", name: "Leg Press",                  sets: 2, repRange: [8, 10]  },
      { id: "legcurl",  name: "Lying Leg Curl",             sets: 3, repRange: [8, 10]  },
      { id: "calf",     name: "Standing Calf Raise",        sets: 3, repRange: [6, 8]   },
    ],
  },
  {
    id: "upper", label: "DAY 4", name: "Upper", focus: "Chest · Back · Shoulders · Arms", color: "#8E44AD",
    exercises: [
      { id: "cgbench",     name: "Close-Grip Bench Press",   sets: 3, repRange: [4, 6]   },
      { id: "cablerow",    name: "Seated Cable Row",         sets: 3, repRange: [6, 8]   },
      { id: "arnold",      name: "Dumbbell Arnold Press",    sets: 3, repRange: [8, 10]  },
      { id: "neutpull",    name: "Neutral-Grip Pull-Up",     sets: 2, repRange: [5, 7]   },
      { id: "cablefly",    name: "Cable Fly (Low to High)",  sets: 2, repRange: [10, 10] },
      { id: "hammerpress", name: "Hammer Curl to Press",     sets: 2, repRange: [8, 10]  },
    ],
  },
  {
    id: "lower", label: "DAY 5", name: "Lower", focus: "Posterior Chain · Power", color: "#E8A12A",
    exercises: [
      { id: "deadlift",   name: "Conventional Deadlift",    sets: 3, repRange: [3, 5]   },
      { id: "frontsquat", name: "Front Squat",              sets: 3, repRange: [5, 7]   },
      { id: "hipthrust",  name: "Barbell Hip Thrust",       sets: 3, repRange: [8, 10]  },
      { id: "lunge",      name: "Walking Lunge (DBs)",      sets: 2, repRange: [8, 10]  },
      { id: "nordic",     name: "Nordic Hamstring Curl",    sets: 2, repRange: [4, 6]   },
      { id: "seatedcalf", name: "Seated Calf Raise",        sets: 3, repRange: [8, 10]  },
    ],
  },
];

const WEEK_SCHEDULE = [
  { day: "Mon", workout: "push" },
  { day: "Tue", workout: "pull" },
  { day: "Wed", workout: "legs" },
  { day: "Thu", workout: null  },
  { day: "Fri", workout: "upper" },
  { day: "Sat", workout: "lower" },
  { day: "Sun", workout: null  },
];

// ─── STATE ────────────────────────────────────────────────────────────────────

let activeDay  = "push";
let currentWeek = 1;
let view = "log";
let logs = {};      // { [dayId]: { [week]: { [exId]: [{weight,reps}] } } }
let saveTimer = null;

// ─── STORAGE ─────────────────────────────────────────────────────────────────

function loadLogs() {
  try {
    const raw = localStorage.getItem("workout_logs_v2");
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function persistLogs() {
  try {
    localStorage.setItem("workout_logs_v2", JSON.stringify(logs));
    flashSave();
  } catch(e) { console.error("Save failed", e); }
}

function flashSave() {
  const el = document.getElementById("save-flash");
  el.textContent = "✓ SAVED";
  el.classList.add("active");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    el.textContent = "AUTO-SAVE";
    el.classList.remove("active");
  }, 1400);
}

// ─── LOG HELPERS ──────────────────────────────────────────────────────────────

function getSets(dayId, week, exId) {
  return logs?.[dayId]?.[week]?.[exId] || [];
}

function initSets(ex) {
  return Array.from({ length: ex.sets }, () => ({ weight: "", reps: "" }));
}

function updateSet(dayId, week, exId, setIdx, field, value) {
  if (!logs[dayId]) logs[dayId] = {};
  if (!logs[dayId][week]) logs[dayId][week] = {};
  if (!logs[dayId][week][exId]) {
    const ex = DAYS.find(d => d.id === dayId).exercises.find(e => e.id === exId);
    logs[dayId][week][exId] = initSets(ex);
  }
  const parsed = value === "" ? "" : parseFloat(value) || 0;
  logs[dayId][week][exId][setIdx] = {
    ...logs[dayId][week][exId][setIdx],
    [field]: parsed,
  };
  persistLogs();
  refreshGoalBanner(dayId, week, exId);
  refreshSetBadge(dayId, week, exId, setIdx);
  refreshVolumeRow(dayId, week, exId);
}

// ─── PROGRESSIVE OVERLOAD LOGIC ───────────────────────────────────────────────

function calcGoal(ex, lastSets) {
  if (!lastSets || lastSets.length === 0) return null;
  const valid = lastSets.filter(s => s.weight > 0 && s.reps > 0);
  if (valid.length === 0) return null;

  const [minRep, maxRep] = ex.repRange;
  const avgReps   = valid.reduce((a, b) => a + b.reps,   0) / valid.length;
  const avgWeight = valid.reduce((a, b) => a + b.weight, 0) / valid.length;
  const allHitTop = valid.every(s => s.reps >= maxRep);

  let goalWeight = avgWeight, goalReps = Math.round(avgReps), strategy = "";

  if (allHitTop) {
    const inc = avgWeight >= 100 ? 5 : 2.5;
    goalWeight = avgWeight + inc;
    goalReps   = minRep;
    strategy   = `You hit all sets at ${maxRep}+ reps — add weight, aim for ${minRep} reps`;
  } else if (avgReps < minRep) {
    goalWeight = avgWeight;
    goalReps   = minRep;
    strategy   = `Hold weight — focus on hitting ${minRep} clean reps per set`;
  } else {
    goalReps   = Math.min(Math.round(avgReps) + 1, maxRep);
    goalWeight = avgWeight;
    strategy   = `Same weight — push for ${goalReps} reps per set`;
  }

  return { goalWeight, goalReps, strategy };
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

function hex(color, alpha) {
  // returns rgba string from hex + 0-1 alpha
  const r = parseInt(color.slice(1,3),16);
  const g = parseInt(color.slice(3,5),16);
  const b = parseInt(color.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function renderAll() {
  renderWeekStrip();
  renderDayHeader();
  renderDayTabs();
  renderContent();
  updateWeekUI();
}

function updateWeekUI() {
  document.getElementById("week-num").textContent = currentWeek;
  const vs = document.getElementById("week-vs");
  vs.textContent = currentWeek > 1 ? `vs Week ${currentWeek - 1}` : "";
}

function renderWeekStrip() {
  const strip = document.getElementById("week-strip");
  strip.innerHTML = "";
  WEEK_SCHEDULE.forEach(({ day, workout }) => {
    const d = DAYS.find(x => x.id === workout);
    const isRest = !workout;
    const isActive = activeDay === workout;
    const btn = document.createElement("button");
    btn.className = "strip-btn" + (isRest ? " rest" : "");
    if (isActive && d) {
      btn.style.border = `1.5px solid ${d.color}`;
      btn.style.background = hex(d.color, 0.12);
    }
    btn.innerHTML = `
      <div class="strip-day" style="color:${isActive && d ? d.color : '#555'}">${day}</div>
      <div class="strip-name" style="color:${isActive && d ? d.color : '#666'}">${isRest ? "REST" : d.name}</div>
    `;
    if (!isRest) btn.onclick = () => { activeDay = workout; renderAll(); };
    strip.appendChild(btn);
  });
}

function renderDayHeader() {
  const d = DAYS.find(x => x.id === activeDay);
  document.getElementById("day-header").style.background =
    `linear-gradient(135deg, ${hex(d.color, 0.09)} 0%, #111 100%)`;
  document.getElementById("day-header").style.border = `1px solid ${hex(d.color, 0.2)}`;
  document.getElementById("dh-eyebrow").textContent = d.label;
  document.getElementById("dh-eyebrow").style.color = d.color;
  document.getElementById("dh-title").textContent = d.name + " Day";
  document.getElementById("dh-focus").textContent = d.focus;

  ["log","goals"].forEach(v => {
    const btn = document.getElementById("btn-" + v);
    if (view === v) {
      btn.style.border = `1.5px solid ${d.color}`;
      btn.style.background = hex(d.color, 0.15);
      btn.style.color = d.color;
    } else {
      btn.style.border = "1.5px solid #2a2a2a";
      btn.style.background = "#1a1a1a";
      btn.style.color = "#555";
    }
  });
}

function renderDayTabs() {
  const wrap = document.getElementById("day-tabs");
  wrap.innerHTML = "";
  DAYS.forEach(d => {
    const btn = document.createElement("button");
    btn.className = "day-tab";
    btn.textContent = d.name;
    if (activeDay === d.id) {
      btn.style.border = `1.5px solid ${d.color}`;
      btn.style.background = hex(d.color, 0.12);
      btn.style.color = d.color;
    }
    btn.onclick = () => { activeDay = d.id; renderAll(); };
    wrap.appendChild(btn);
  });
}

function renderContent() {
  const d = DAYS.find(x => x.id === activeDay);
  const content = document.getElementById("content");
  content.innerHTML = "";

  if (view === "log") {
    d.exercises.forEach(ex => {
      content.appendChild(buildExCard(d, ex));
    });
  } else {
    // Goals view
    const hint = document.createElement("div");
    hint.className = "goals-hint";
    hint.textContent = currentWeek === 1
      ? "Log Week 1 first — your Week 2 goals will appear here automatically."
      : `Goals for Week ${currentWeek} based on your Week ${currentWeek - 1} performance.`;
    content.appendChild(hint);

    d.exercises.forEach(ex => {
      content.appendChild(buildGoalCard(d, ex));
    });
  }
}

function buildExCard(d, ex) {
  const prevSets = getSets(activeDay, currentWeek - 1, ex.id).filter(s => s.weight > 0 && s.reps > 0);
  const goal = currentWeek > 1 ? calcGoal(ex, prevSets) : null;
  const currSets = getSets(activeDay, currentWeek, ex.id);
  const filled = currSets.length > 0 ? currSets : initSets(ex);

  const card = document.createElement("div");
  card.className = "ex-card";
  card.id = `card-${activeDay}-${ex.id}`;

  // Header
  const hdr = document.createElement("div");
  hdr.className = "ex-header";

  const top = document.createElement("div");
  top.className = "ex-top";
  top.innerHTML = `
    <div class="ex-name">${ex.name}</div>
    <div class="chips">
      <span class="chip" style="background:${hex(d.color,0.12)};border:1px solid ${hex(d.color,0.27)};color:${d.color}">${ex.sets}×</span>
      <span class="chip" style="background:${hex(d.color,0.12)};border:1px solid ${hex(d.color,0.27)};color:${d.color}">${ex.repRange[0]}–${ex.repRange[1]} reps</span>
    </div>
  `;
  hdr.appendChild(top);

  // Goal banner
  if (goal) {
    const banner = document.createElement("div");
    banner.className = "goal-banner";
    banner.id = `banner-${activeDay}-${ex.id}`;
    banner.style.background = hex(d.color, 0.08);
    banner.style.border = `1px solid ${hex(d.color, 0.18)}`;
    banner.style.color = d.color;
    banner.innerHTML = `<strong>🎯 This week:</strong> ${goal.goalWeight} lbs × ${goal.goalReps} reps — ${goal.strategy}`;
    hdr.appendChild(banner);
  } else if (currentWeek === 1) {
    const hint = document.createElement("div");
    hint.className = "ex-hint";
    hint.textContent = "Log your starting weights — goals generate from Week 2 onward";
    hdr.appendChild(hint);
  }
  card.appendChild(hdr);

  // Body
  const body = document.createElement("div");
  body.className = "ex-body";

  // Column headers
  const colHdrs = document.createElement("div");
  colHdrs.className = "col-headers";
  colHdrs.innerHTML = `<div class="col-hdr">WEIGHT (lbs)</div><div class="col-hdr">REPS</div>`;
  if (currentWeek > 1 && prevSets.length > 0) {
    colHdrs.innerHTML += `<div class="col-hdr" style="color:#333">LAST WEEK</div>`;
  }
  body.appendChild(colHdrs);

  // Sets
  Array.from({ length: ex.sets }).forEach((_, i) => {
    const s = filled[i] || { weight: "", reps: "" };
    const prev = prevSets[i];
    const hitGoal = goal && parseFloat(s.weight) >= goal.goalWeight && parseFloat(s.reps) >= goal.goalReps;

    const row = document.createElement("div");
    row.className = "set-row";

    const badge = document.createElement("div");
    badge.className = "set-badge";
    badge.id = `badge-${activeDay}-${ex.id}-${i}`;
    badge.style.background = hitGoal ? hex(d.color, 0.18) : "#1a1a1a";
    badge.style.border = hitGoal ? `1px solid ${d.color}` : "1px solid #2a2a2a";
    badge.style.color = hitGoal ? d.color : "#444";
    badge.textContent = hitGoal ? "✓" : (i + 1);
    row.appendChild(badge);

    // Weight input
    const wInput = document.createElement("input");
    wInput.type = "number"; wInput.inputMode = "decimal";
    wInput.className = "set-input"; wInput.placeholder = "0";
    wInput.value = s.weight !== "" ? s.weight : "";
    wInput.style.borderColor = "#2a2a2a";
    wInput.addEventListener("focus", () => wInput.style.borderColor = d.color);
    wInput.addEventListener("blur",  () => wInput.style.borderColor = "#2a2a2a");
    wInput.addEventListener("input", () => updateSet(activeDay, currentWeek, ex.id, i, "weight", wInput.value));
    row.appendChild(wInput);

    // Reps input
    const rInput = document.createElement("input");
    rInput.type = "number"; rInput.inputMode = "numeric";
    rInput.className = "set-input"; rInput.placeholder = "0";
    rInput.value = s.reps !== "" ? s.reps : "";
    rInput.style.borderColor = "#2a2a2a";
    rInput.addEventListener("focus", () => rInput.style.borderColor = d.color);
    rInput.addEventListener("blur",  () => rInput.style.borderColor = "#2a2a2a");
    rInput.addEventListener("input", () => updateSet(activeDay, currentWeek, ex.id, i, "reps", rInput.value));
    row.appendChild(rInput);

    // Previous value
    if (currentWeek > 1) {
      const prevEl = document.createElement("div");
      prevEl.className = "prev-val";
      prevEl.textContent = (prev && prev.weight > 0) ? `${prev.weight}×${prev.reps}` : "—";
      row.appendChild(prevEl);
    }

    body.appendChild(row);
  });

  // Volume row
  const volRow = document.createElement("div");
  volRow.className = "volume-row";
  volRow.id = `vol-${activeDay}-${ex.id}`;
  updateVolRowContent(volRow, ex);
  body.appendChild(volRow);

  card.appendChild(body);
  return card;
}

function updateVolRowContent(volRow, ex) {
  const currSets = getSets(activeDay, currentWeek, ex.id).filter(s => s.weight > 0 && s.reps > 0);
  if (currSets.length === 0) { volRow.innerHTML = ""; return; }

  const vol = currSets.reduce((a, s) => a + (s.weight * s.reps), 0);
  const prevSets = getSets(activeDay, currentWeek - 1, ex.id).filter(s => s.weight > 0 && s.reps > 0);
  const prevVol  = prevSets.reduce((a, s) => a + (s.weight * s.reps), 0);
  const diff = vol - prevVol;

  volRow.innerHTML = `
    <span class="vol-label">TOTAL VOLUME</span>
    <span class="vol-num">${vol.toLocaleString()} lbs</span>
    ${prevVol > 0 && diff !== 0 ? `<span class="vol-diff" style="color:${diff > 0 ? '#27AE60' : '#E85757'}">${diff > 0 ? '+' : ''}${diff.toLocaleString()}</span>` : ""}
  `;
}

function buildGoalCard(d, ex) {
  const prevSets = getSets(activeDay, currentWeek - 1, ex.id).filter(s => s.weight > 0 && s.reps > 0);
  const goal = currentWeek > 1 ? calcGoal(ex, prevSets) : null;
  const thisSets = getSets(activeDay, currentWeek, ex.id).filter(s => s.weight > 0 && s.reps > 0);
  const done = goal && thisSets.length >= ex.sets && thisSets.every(s => s.weight >= goal.goalWeight && s.reps >= goal.goalReps);

  const card = document.createElement("div");
  card.className = "goal-card";
  if (done) {
    card.style.background = hex(d.color, 0.07);
    card.style.border = `1px solid ${hex(d.color, 0.27)}`;
  }

  let inner = `
    <div class="goal-card-top">
      <div class="goal-card-name">${ex.name}</div>
      ${done ? `<span class="crushed-label" style="color:${d.color}">✓ CRUSHED</span>` : ""}
    </div>
  `;

  if (goal) {
    inner += `
      <div class="goal-boxes">
        <div class="goal-box" style="border:1px solid ${hex(d.color, 0.18)}">
          <div class="goal-box-label">TARGET WEIGHT</div>
          <div class="goal-box-val" style="color:${d.color}">${goal.goalWeight} lbs</div>
        </div>
        <div class="goal-box" style="border:1px solid ${hex(d.color, 0.18)}">
          <div class="goal-box-label">TARGET REPS</div>
          <div class="goal-box-val" style="color:${d.color}">${goal.goalReps} ea</div>
        </div>
        <div class="goal-box" style="border:1px solid ${hex(d.color, 0.18)}">
          <div class="goal-box-label">SETS</div>
          <div class="goal-box-val" style="color:${d.color}">${ex.sets}×</div>
        </div>
      </div>
      <div class="goal-strategy">${goal.strategy}</div>
      ${prevSets.length > 0 ? `<div class="goal-last">Last week avg: ${(prevSets.reduce((a,b)=>a+b.weight,0)/prevSets.length).toFixed(1)} lbs × ${(prevSets.reduce((a,b)=>a+b.reps,0)/prevSets.length).toFixed(1)} reps</div>` : ""}
    `;
  } else {
    inner += `<div class="goal-empty">${currentWeek === 1 ? "Log this exercise to unlock your Week 2 goal" : "No previous data — log this week to generate next week's goal"}</div>`;
  }

  card.innerHTML = inner;
  return card;
}

// ─── PARTIAL UPDATES (avoid full re-render on every keystroke) ────────────────

function refreshGoalBanner(dayId, week, exId) {
  const ex = DAYS.find(d => d.id === dayId).exercises.find(e => e.id === exId);
  const d  = DAYS.find(x => x.id === dayId);
  const prevSets = getSets(dayId, week - 1, exId).filter(s => s.weight > 0 && s.reps > 0);
  const goal = week > 1 ? calcGoal(ex, prevSets) : null;
  const banner = document.getElementById(`banner-${dayId}-${exId}`);
  if (banner && goal) {
    banner.innerHTML = `<strong>🎯 This week:</strong> ${goal.goalWeight} lbs × ${goal.goalReps} reps — ${goal.strategy}`;
  }
}

function refreshSetBadge(dayId, week, exId, setIdx) {
  const ex = DAYS.find(d => d.id === dayId).exercises.find(e => e.id === exId);
  const d  = DAYS.find(x => x.id === dayId);
  const prevSets = getSets(dayId, week - 1, exId).filter(s => s.weight > 0 && s.reps > 0);
  const goal = week > 1 ? calcGoal(ex, prevSets) : null;
  const s = (getSets(dayId, week, exId) || [])[setIdx] || {};
  const hitGoal = goal && parseFloat(s.weight) >= goal.goalWeight && parseFloat(s.reps) >= goal.goalReps;
  const badge = document.getElementById(`badge-${dayId}-${exId}-${setIdx}`);
  if (badge) {
    badge.style.background = hitGoal ? hex(d.color, 0.18) : "#1a1a1a";
    badge.style.border = hitGoal ? `1px solid ${d.color}` : "1px solid #2a2a2a";
    badge.style.color = hitGoal ? d.color : "#444";
    badge.textContent = hitGoal ? "✓" : (setIdx + 1);
  }
}

function refreshVolumeRow(dayId, week, exId) {
  const ex = DAYS.find(d => d.id === dayId).exercises.find(e => e.id === exId);
  const volRow = document.getElementById(`vol-${dayId}-${exId}`);
  if (volRow) updateVolRowContent(volRow, ex);
}

// ─── VIEW SWITCHER ────────────────────────────────────────────────────────────

function setView(v) {
  view = v;
  renderDayHeader();
  renderContent();
}

// ─── WEEK BUTTONS ─────────────────────────────────────────────────────────────

document.getElementById("week-prev").onclick = () => {
  if (currentWeek > 1) { currentWeek--; renderAll(); }
};
document.getElementById("week-next").onclick = () => {
  currentWeek++;
  renderAll();
};

// ─── BOOT ─────────────────────────────────────────────────────────────────────

logs = loadLogs();
renderAll();
</script>
</body>
</html>
